  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function todayStr(){ return new Date().toISOString().slice(0,10); }

  function fmtDate(d){
    if(!d) return '';
    var dt = new Date(d);
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  }

  function parseContactFromNote(note){
    if(!note) return null;
    var idx = note.indexOf('Contact:');
    if(idx === -1) return null;
    var raw = note.slice(idx + 'Contact:'.length).trim();
    if(raw.charAt(raw.length - 1) === '.') raw = raw.slice(0, -1).trim();
    if(!raw) return null;
    var commaIdx = raw.indexOf(',');
    var name, title;
    if(commaIdx === -1){ name = raw; title = ''; }
    else { name = raw.slice(0, commaIdx).trim(); title = raw.slice(commaIdx + 1).trim(); }
    if(!name) return null;
    return { name: name, title: title, email: '', phone: '', role: 'Decision maker' };
  }

  function migrateContactsFromActivities(account){
    if(!account.contacts) account.contacts = [];
    if(account.contacts.length > 0) return account;
    var found = [];
    (account.activities || []).forEach(function(act){
      var c = parseContactFromNote(act.notes);
      if(c && found.length < 4 && !found.some(function(f){ return f.name === c.name; })){
        found.push(c);
      }
    });
    if(found.length > 0) account.contacts = found;
    return account;
  }

  async function load(){
    try {
      var res = await window.storage.get(STORAGE_KEY, true);
      accounts = res && res.value ? JSON.parse(res.value) : [];
    } catch(e){
      accounts = [];
    }
    if (accounts.length === 0) {
      accounts = buildSeedAccounts();
    }
    var existingNames = accounts.map(function(a){ return a.name; });
    var newSuppliers = buildSupplierAccounts().filter(function(a){
      return existingNames.indexOf(a.name) === -1;
    });
    if (newSuppliers.length > 0) {
      accounts = accounts.concat(newSuppliers);
    }
    accounts = accounts.map(function(a){
      a = migrateClassification(a);
      return migrateContactsFromActivities(a);
    });
    await save();
    render();
  }

  async function save(){
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(accounts), true);
    } catch(e){
      console.error('Storage error', e);
    }
  }

  async function loadSharePointLink(){
    var link = '';
    try {
      var res = await window.storage.get(SHAREPOINT_KEY, true);
      link = res && res.value ? res.value : '';
    } catch(e){ link = ''; }
    renderSharePointBar(link);
  }

  async function saveSharePointLink(link){
    try {
      await window.storage.set(SHAREPOINT_KEY, link, true);
    } catch(e){
      console.error('Storage error', e);
    }
  }

  function renderSharePointBar(link){
    var el = document.getElementById('at-sharepoint-display');
    if(!link){
      el.innerHTML = '<span class="at-hint">Not set yet</span> <button class="at-btn secondary" id="sp-edit" style="padding:4px 10px; font-size:11px;">Add link</button>';
    } else {
      el.innerHTML = '<a href="' + escapeHtml(link) + '" target="_blank" rel="noopener">' + escapeHtml(link) + '</a> <button class="at-btn secondary" id="sp-edit" style="padding:4px 10px; font-size:11px;">Edit</button>';
    }
    document.getElementById('sp-edit').addEventListener('click', function(){
      el.innerHTML = '<input type="text" id="sp-input" placeholder="Paste SharePoint folder/library link" value="' + escapeHtml(link) + '" />' +
        '<button class="at-btn secondary" id="sp-save" style="padding:4px 10px; font-size:11px;">Save</button>';
      document.getElementById('sp-save').addEventListener('click', function(){
        var newLink = document.getElementById('sp-input').value.trim();
        saveSharePointLink(newLink);
        renderSharePointBar(newLink);
      });
    });
  }

  function getFiltered(){
    var cls = document.getElementById('at-filter-class').value;
    var tier = document.getElementById('at-filter-tier').value;
    var cosell = document.getElementById('at-filter-cosell').value;
    var ecif = document.getElementById('at-filter-ecif').value;
    var search = document.getElementById('at-filter-search').value.toLowerCase();
    return accounts.filter(function(a){
      if(cls && a.classification !== cls) return false;
      if(tier && String(a.tier) !== tier) return false;
      if(cosell === 'yes' && !a.msCosell) return false;
      if(cosell === 'no' && a.msCosell) return false;
      if(ecif && (a.ecifStatus || 'Not applicable') !== ecif) return false;
      if(search && (a.name + ' ' + a.owner).toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
  }

  function daysUntil(dateStr){
    var d = new Date(dateStr + 'T00:00:00');
    var today = new Date();
    today.setHours(0,0,0,0);
    return Math.round((d - today) / 86400000);
  }

  function collectActions(){
    var items = [];
    accounts.forEach(function(a){
      if(a.nextStepDate){
        items.push({
          accountId: a.id, accountName: a.name, date: a.nextStepDate,
          desc: a.nextStep || 'Next step', source: 'Next step', kind: 'nextstep'
        });
      }
      (a.activities || []).forEach(function(act){
        if(act.dueDate && !act.done){
          items.push({
            accountId: a.id, accountName: a.name, date: act.dueDate,
            desc: act.title, source: act.type, kind: 'activity', activityId: act.id
          });
        }
      });
    });
    items.sort(function(x, y){ return x.date < y.date ? -1 : (x.date > y.date ? 1 : 0); });
    return items;
  }

  var actionsPanelCollapsed = false;

  function renderActionsPanel(){
    var body = document.getElementById('at-actions-body');
    var countsEl = document.getElementById('at-actions-counts');
    var items = collectActions();
    var overdue = items.filter(function(i){ return daysUntil(i.date) < 0; }).length;
    var soon = items.filter(function(i){ var d = daysUntil(i.date); return d >= 0 && d <= 3; }).length;
    countsEl.textContent = items.length + ' open' + (overdue ? ' \u00b7 ' + overdue + ' overdue' : '') + (soon ? ' \u00b7 ' + soon + ' due soon' : '');

    body.style.display = actionsPanelCollapsed ? 'none' : '';
    document.getElementById('at-actions-toggle-icon').textContent = actionsPanelCollapsed ? '▸' : '▾';

    if(items.length === 0){
      body.innerHTML = '<div class="at-actions-empty">No open actions or due dates logged yet.</div>';
      return;
    }

    body.innerHTML = items.map(function(item){
      var d = daysUntil(item.date);
      var cls = d < 0 ? 'overdue' : (d <= 3 ? 'soon' : 'later');
      var label = d < 0 ? (Math.abs(d) + 'd overdue') : (d === 0 ? 'Today' : (d === 1 ? 'Tomorrow' : fmtDate(item.date)));
      var doneBtn = item.kind === 'activity'
        ? '<button class="adone-btn" data-account="' + item.accountId + '" data-activity="' + item.activityId + '">Mark done</button>'
        : '';
      return '<div class="at-action-row ' + cls + '" data-account="' + item.accountId + '" data-kind="' + item.kind + '">' +
        '<span class="bar"></span>' +
        '<span class="adate">' + escapeHtml(label) + '</span>' +
        '<span class="acompany">' + escapeHtml(item.accountName) + '</span>' +
        '<span class="adesc">' + escapeHtml(item.desc) + '</span>' +
        '<span class="asrc">' + escapeHtml(item.source) + '</span>' +
        doneBtn +
        '</div>';
    }).join('');

    body.querySelectorAll('.at-action-row').forEach(function(row){
      row.addEventListener('click', function(e){
        if(e.target.classList.contains('adone-btn')) return;
        openDetail(row.getAttribute('data-account'));
        if(row.getAttribute('data-kind') === 'activity'){
          setTimeout(function(){
            var tab = document.querySelector('.at-tab[data-tab="activity"]');
            if(tab) tab.click();
          }, 0);
        }
      });
    });
    body.querySelectorAll('.adone-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        var accId = btn.getAttribute('data-account');
        var actId = btn.getAttribute('data-activity');
        var acc = accounts.find(function(a){ return a.id === accId; });
        if(!acc) return;
        var act = acc.activities.find(function(x){ return x.id === actId; });
        if(!act) return;
        act.done = true;
        save();
        renderActionsPanel();
      });
    });
  }

  function renderBoard(){
    var board = document.getElementById('at-board');
    var filtered = getFiltered();
    if(accounts.length === 0){
      board.innerHTML = '<div class="at-empty" style="width:100%;">' +
        '<div class="big">No accounts in the pipeline yet</div>' +
        '<div>Add your first target account to start tracking it here.</div></div>';
      return;
    }
    board.innerHTML = '';
    STAGES.forEach(function(stage){
      var col = document.createElement('div');
      col.className = 'at-col';
      var inStage = filtered.filter(function(a){ return a.stage === stage; });
      col.innerHTML = '<h4>' + stage + ' <span>' + inStage.length + '</span></h4>';
      inStage.forEach(function(a){
        var card = document.createElement('div');
        card.className = 'at-card';
        var ecifStatus = a.ecifStatus || 'Not applicable';
        var ecifHtml = (ecifStatus === 'Not applicable' || ecifStatus === 'Not started')
          ? ''
          : '<span class="at-ecif ' + ecifBadgeClass(ecifStatus) + '">ECIF: ' + escapeHtml(ecifStatus) + '</span>';
        card.innerHTML =
          '<div class="nm">' + escapeHtml(a.name) + '</div>' +
          '<div class="meta"><span class="at-class ' + classBadgeClass(a.classification) + '">' + escapeHtml(a.classification || 'Buyer') + '</span><span class="at-tier at-tier' + a.tier + '">Tier ' + a.tier + '</span> &middot; ' + escapeHtml(a.owner || 'Unassigned') + '</div>' +
          (a.nextStep ? '<div class="meta">Next: ' + escapeHtml(a.nextStep) + (a.nextStepDate ? ' (' + fmtDate(a.nextStepDate) + ')' : '') + '</div>' : '') +
          nodesHtml(a) + ecifHtml;
        card.addEventListener('click', function(){ openDetail(a.id); });
        col.appendChild(card);
      });
      board.appendChild(col);
    });
  }

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

        type: document.getElementById('da-type').value,
        date: document.getElementById('da-date').value || todayStr(),
        title: title,
        notes: document.getElementById('da-notes').value.trim(),
        link: document.getElementById('da-link').value.trim(),
        dueDate: dueDate || null,
        done: false
      });
      save();
      openDetail(a.id);
    };
  }

  document.getElementById('at-add-account').addEventListener('click', openAddModal);
  document.getElementById('at-refresh').addEventListener('click', load);

  document.getElementById('at-export').addEventListener('click', function(){
    var blob = new Blob([JSON.stringify(accounts, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'adapt-tracker-backup-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('at-import').addEventListener('click', function(){
    document.getElementById('at-import-file').click();
  });

  document.getElementById('at-import-file').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try {
        var imported = JSON.parse(evt.target.result);
        if(!Array.isArray(imported)) throw new Error('File is not a valid accounts export.');
        var msg = 'Import ' + imported.length + ' accounts? This will replace everything currently shown (' + accounts.length + ' accounts). This cannot be undone.';
        if(!window.confirm(msg)) return;
        accounts = imported;
        save().then(function(){
          render();
          alert('Import complete: ' + accounts.length + ' accounts loaded.');
        });
      } catch(err){
        alert('Could not import this file: ' + err.message);
      }
      document.getElementById('at-import-file').value = '';
    };
    reader.readAsText(file);
  });
  document.getElementById('at-filter-class').addEventListener('change', renderBoard);
  document.getElementById('at-filter-tier').addEventListener('change', renderBoard);
  document.getElementById('at-filter-cosell').addEventListener('change', renderBoard);
  document.getElementById('at-filter-ecif').addEventListener('change', renderBoard);
  document.getElementById('at-filter-search').addEventListener('input', renderBoard);

  document.getElementById('at-actions-toggle').addEventListener('click', function(){
    actionsPanelCollapsed = !actionsPanelCollapsed;
    renderActionsPanel();
  });

  load();
  loadSharePointLink();
})();
</script>
</div>

</body>
</html>
